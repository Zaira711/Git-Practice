<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles/styles1.css">
</head>
<body>
    <main class="contenedorLogin">
        <form class="form" method="POST" action="php/register.php">
            <h1 class="h3 mb-3 fw-normal">Crea una cuenta en la ferreteria</h1>
            <div class="inputblock">
                <label for="floatingInput">Nombre completo</label>
                <input type="text" class="inputs" id="floatingInput" placeholder="Nombre Apellido" name="nombre">
            </div>

            <div class="inputblock">
                <label for="floating">Email address</label>
                <input type="email" class="inputs" id="floatingInput" placeholder="email@example.com" name="correo">
            </div>

            <div class="inputblock">
                <label for="floatingPassword">Password</label>
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" name="password">

            </div>
            <div class="inputblock">
                <button class="btn btn-primary" type="submit">Sign in</button>
                <p class="anio"> 2027-2025</p>
            </div>
        </form>
    </main>
</body>
</html>
